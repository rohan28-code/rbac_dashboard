<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBAC Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex" x-data="{ sidebarOpen: true }">

    <!-- Hamburger Button -->
    <button @click="sidebarOpen = !sidebarOpen"
        class="fixed top-4 left-4 z-50 bg-gray-900 text-white p-2 rounded-lg hover:bg-gray-700 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
    </button>

    <!-- Sidebar -->
    <aside x-show="sidebarOpen" x-transition:enter="transition-transform duration-300"
        x-transition:enter-start="-translate-x-full" x-transition:enter-end="translate-x-0"
        x-transition:leave="transition-transform duration-300"
        x-transition:leave-start="translate-x-0" x-transition:leave-end="-translate-x-full"
        class="w-64 bg-gray-900 text-white min-h-screen flex flex-col flex-shrink-0">
        <div class="pl-14 pr-6 py-5 border-b border-gray-700">
            <h1 class="text-xl font-bold tracking-wide">RBAC Dashboard</h1>
            <p class="text-xs text-gray-400 mt-1">{{ request.user.username }}</p>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-1">
            <a href="/" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-700 transition text-sm font-medium">
                🏠 Home
            </a>
            {% if request.user.groups.all.0.name == 'admin' %}
            <!-- Projects Dropdown -->
            <div x-data="{ open: false }">
                <button @click="open = !open" class="flex items-center justify-between w-full px-4 py-2 rounded-lg hover:bg-gray-700 transition text-sm font-medium">
                    <span class="flex items-center gap-3">📁 Projects</span>
                    <svg :class="open ? 'rotate-180' : ''"
                        class="w-4 h-4 transition-transform duration-200"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div x-show="open" x-transition class="ml-4 mt-1 space-y-1">
                    <a href="/projects/" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-700 transition text-sm">
                        📋 View Projects
                    </a>
                    <a href="/projects/add/" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-700 transition text-sm">
                        ➕ Add Project
                    </a>
                </div>
            </div>
            {% endif %}
        </nav>
        <div class="px-4 py-4 border-t border-gray-700">
            <form method="post" action="/logout/">
                {% csrf_token %}
                <button type="submit" class="flex items-center gap-3 w-full px-4 py-2 rounded-lg hover:bg-red-600 transition text-sm font-medium">
                    🚪 Logout
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 pt-16">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
