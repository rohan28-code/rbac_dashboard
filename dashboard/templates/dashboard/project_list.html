{% extends 'dashboard/base.html' %}

{% block content %}

<div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Projects</h2>
    <a href="/projects/add/" class="bg-gray-900 text-white text-sm px-4 py-2 rounded-lg hover:bg-gray-700 transition">+ Add Project</a>
</div>

<div class="bg-white rounded-2xl shadow overflow-hidden">
    <table class="w-full text-sm text-left">
        <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
            <tr>
                <th class="px-6 py-4">#</th>
                <th class="px-6 py-4">Title</th>
                <th class="px-6 py-4">Description</th>
                <th class="px-6 py-4">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
            {% for project in projects %}
            <tr class="hover:bg-gray-50 transition">
                <td class="px-6 py-4 text-gray-400">{{ forloop.counter }}</td>
                <td class="px-6 py-4 font-medium text-gray-800">{{ project.title }}</td>
                <td class="px-6 py-4 text-gray-500">{{ project.description }}</td>
                <td class="px-6 py-4 flex gap-2">
                    <a href="/projects/edit/{{ project.id }}/" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-lg text-xs font-medium hover:bg-blue-200 transition">Edit</a>
                    <a href="/projects/delete/{{ project.id }}/" class="bg-red-100 text-red-700 px-3 py-1 rounded-lg text-xs font-medium hover:bg-red-200 transition">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="px-6 py-8 text-center text-gray-400">No projects found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
