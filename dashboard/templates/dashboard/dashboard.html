{% extends 'dashboard/base.html' %}

{% block content %}

<div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Welcome, {{ request.user.username }} 👋</h2>
    <p class="text-gray-500 text-sm mt-1">You are logged in as <span class="font-semibold text-gray-700">Admin</span></p>
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
    <a href="/projects/" class="bg-white rounded-2xl shadow p-6 hover:shadow-md transition">
        <div class="text-3xl mb-3">📁</div>
        <h3 class="text-lg font-semibold text-gray-800">Projects</h3>
        <p class="text-sm text-gray-500 mt-1">View and manage all projects</p>
    </a>
    <a href="/projects/add/" class="bg-white rounded-2xl shadow p-6 hover:shadow-md transition">
        <div class="text-3xl mb-3">➕</div>
        <h3 class="text-lg font-semibold text-gray-800">Add Project</h3>
        <p class="text-sm text-gray-500 mt-1">Create a new project entry</p>
    </a>
</div>

{% endblock %}
