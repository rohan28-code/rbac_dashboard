{% extends 'dashboard/base.html' %}

{% block content %}

<div class="max-w-lg">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Project Form</h2>

    <div class="bg-white rounded-2xl shadow p-6">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                {% if field.field.widget.input_type == 'textarea' %}
                <textarea
                    name="{{ field.html_name }}"
                    id="{{ field.id_for_label }}"
                    rows="4"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800"
                >{{ field.value|default:'' }}</textarea>
                {% else %}
                <input
                    type="{{ field.field.widget.input_type }}"
                    name="{{ field.html_name }}"
                    id="{{ field.id_for_label }}"
                    value="{{ field.value|default:'' }}"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800"
                >
                {% endif %}
                {% if field.errors %}
                <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}
            <div class="flex gap-3 pt-2">
                <button type="submit" class="bg-gray-900 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-gray-700 transition">Save</button>
                <a href="/projects/" class="bg-gray-100 text-gray-700 px-5 py-2 rounded-lg text-sm font-semibold hover:bg-gray-200 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
